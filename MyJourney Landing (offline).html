document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x; font-weight: 700; padding: 17px 30px; border-radius: 999px;\n  text-decoration: none; display: inline-flex; align-items: center; gap: 10px; letter-spacing: -0.01em;\n  cursor: pointer; border: none; transition: transform .18s ease, box-shadow .18s ease, background .18s ease; }\n.btn svg { width: 18px; height: 18px; }\n.btn.primary { background: var(--teal); color: #fff; box-shadow: 0 16px 32px -14px rgba(21,168,140,.7); }\n.btn.primary:hover { transform: translateY(-2px); box-shadow: 0 22px 40px -14px rgba(21,168,140,.8); }\n.btn.dark { background: var(--navy); color: #fff; }\n.btn.dark:hover { transform: translateY(-2px); background: var(--navy-soft); }\n.btn.ghost { background: var(--white); color: var(--navy); border: 1.5px solid var(--line); }\n.btn.ghost:hover { border-color: var(--teal); color: var(--teal-deep); }\n.btn.text { background: none; color: var(--navy); padding: 17px 4px; }\n.btn.text:hover { color: var(--teal-deep); gap: 14px; }\n\n/* ---------- nav ---------- */\n.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 18px var(--pad-x); transition: background .3s ease, box-shadow .3s ease, padding .3s ease;\n  background: rgba(243,246,246,0); }\n.nav.scrolled { background: rgba(243,246,246,.86); backdrop-filter: blur(14px); box-shadow: 0 1px 0 var(--line); padding: 12px var(--pad-x); }\n.nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }\n.nav-brand img { width: 38px; height: 33px; object-fit: contain; }\n.nav-brand .wm { font-size: 23px; font-weight: 800; letter-spacing: -0.02em; color: var(--navy); }\n.nav-brand .wm .v { color: var(--teal-deep); }\n.nav-links { display: flex; align-items: center; gap: 36px; }\n.nav-links a { font-size: 16px; font-weight: 600; text-decoration: none; color: var(--muted); letter-spacing: -0.01em; transition: color .15s; }\n.nav-links a:hover { color: var(--navy); }\n.nav-right { display: flex; align-items: center; gap: 22px; }\n.lang-toggle { display: inline-flex; font-family: var(--font-mono); font-size: 13px; font-weight: 600; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; background: var(--white); }\n.lang-toggle button { font-family: var(--font-mono); border: none; background: none; cursor: pointer; padding: 7px 13px; color: var(--muted-2); font-weight: 600; font-size: 13px; letter-spacing: 0.04em; transition: all .15s; }\n.lang-toggle button.on { background: var(--navy); color: #fff; }\n.nav-cta { background: var(--navy); color: #fff; font-size: 15px; font-weight: 700; padding: 11px 20px; border-radius: 999px; text-decoration: none; transition: background .18s, transform .18s; }\n.nav-cta:hover { background: var(--navy-soft); transform: translateY(-1px); }\n.nav-burger { display: none; }\n\n/* ---------- HERO ---------- */\n.hero { position: relative; padding: 150px 0 80px; overflow: hidden; }\n.hero .hills { position: absolute; left: 0; right: 0; top: 0; height: 600px; z-index: 0; pointer-events: none; will-change: transform; }\n.hero-grid { display: grid; grid-template-columns: 1fr 0.84fr; gap: 56px; align-items: center; position: relative; z-index: 2; }\n.pill { display: inline-flex; align-items: center; gap: 9px; background: var(--white); border: 1px solid var(--teal-soft2);\n  border-radius: 999px; padding: 9px 18px 9px 11px; font-size: 14px; font-weight: 600; color: var(--teal-deep);\n  box-shadow: 0 6px 18px rgba(22,38,63,.05); }\n.pill .ic { width: 22px; height: 22px; border-radius: 50%; background: var(--teal-soft); display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }\n.hero h1 { font-size: 70px; line-height: 1.03; margin: 24px 0 0; }\n.hero h1 .hl { color: var(--teal-deep); }\n.hero .tag { font-size: 23px; line-height: 1.55; color: var(--muted); max-width: 36ch; margin: 26px 0 0; font-weight: 500; }\n.hero .tag strong { color: var(--navy); font-weight: 700; }\n.hero .cta-row { display: r(--line); }\n.why .head { max-width: 30ch; }\n.why .intro { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }\n.why .intro p { margin: 0; font-size: 20px; line-height: 1.6; color: var(--muted); }\n.why .intro p strong { color: var(--navy); }\n.quote { margin: 56px 0; background: var(--navy); color: #fff; border-radius: 24px; padding: 52px 56px; position: relative; overflow: hidden; }\n.quote .glow { position: absolute; right: -80px; top: -80px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(21,168,140,.3), transparent 70%); }\n.quote q { font-size: 32px; line-height: 1.4; font-weight: 700; letter-spacing: -0.02em; quotes: none; position: relative; z-index: 1; display: block; max-width: 40ch; }\n.quote .attr { margin-top: 26px; font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); position: relative; z-index: 1; }\n.problem-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 26px; margin-top: 8px; }\n.pcard { background: var(--bg); border: 1px solid var(--line); border-radius: 22px; padding: 38px 36px; display: flex; flex-direction: column; gap: 16px; transition: transform .25s ease, box-shadow .25s ease; }\n.pcard:hover { transform: translateY(-4px); box-shadow: 0 24px 50px -28px rgba(22,38,63,.28); }\n.pcard .ico { width: 58px; height: 58px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }\n.pcard .ico svg { width: 28px; height: 28px; }\n.pcard.c1 .ico { background: var(--coral-soft); }\n.pcard.c2 .ico { background: var(--lav-soft); }\n.pcard.c3 .ico { background: var(--amber-soft); }\n.pcard.c4 .ico { background: var(--teal-soft); }\n.pcard h4 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }\n.pcard p { margin: 0; font-size: 18px; line-height: 1.55; color: var(--muted); }\n\n/* ---------- statement interstitial ---------- */\n.statement { background: var(--navy); color: #fff; text-align: center; position: relative; overflow: hidden; }\n.statement .glow { position: absolute; width: 700px; height: 700px; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%,-50%); background: radial-gradient(circle, rgba(21,168,140,.22), transparent 66%); }\n.statement .eyebrow { color: var(--teal); }\n.statement h2 { color: #fff; font-size: 50px; line-height: 1.18; max-width: 22ch; margin: 28px auto 0; position: relative; z-index: 1; }\n.statement h2 .hl { color: var(--teal); }\n\n/* ---------- MyJourney / product ---------- */\n.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-top: 60px; }\n.step { background: var(--white); border: 1px solid var(--line); border-radius: 24px; padding: 42px 36px; position: relative;\n  display: flex; flex-direction: column; gap: 16px; box-shadow: 0 18px 44px rgba(22,38,63,.05); }\n.step .num { position: absolute; top: -20px; left: 36px; width: 44px; height: 44px; border-radius: 13px; background: var(--navy);\n  color: #fff; font-weight: 800; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(22,38,63,.18); }\n.step .ico { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-top: 6px; }\n.step.a .ico { background: var(--teal-soft); }\n.step.b .ico { background: var(--lav-soft); }\n.step.c .ico { background: var(--amber-soft); }\n.step h4 { font-size: 25px; font-weight: 700; letter-spacing: -0.02em; }\n.step p { margin: 0; font-size: 18px; line-height: 1.55; color: var(--muted); }\n\n.feature { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center; }\n.feature + .feature { margin-top: 120px; }\n.feature.flip .feat-copy { order: 2; }\n.feat-copy { display: flex; flex-direction: column; gap: 22px; }\n.feat-copy h3 { font-size: 42px; line-height: 1.08; }\n.feat-copy .lead { font-size: 21px; }\n.feat-copy ul { list-style: none; padding: ; }\n.talk-meta .value a:hover { text-decoration: underline; }\n\n.foot { border-top: 1px solid rgba(255,255,255,.12); margin-top: 80px; padding-top: 34px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; flex-wrap: wrap; gap: 18px; }\n.foot .fb { display: flex; align-items: center; gap: 12px; }\n.foot .fb img { width: 32px; height: 28px; object-fit: contain; }\n.foot .fb .wm { font-size: 19px; font-weight: 800; color: #fff; }\n.foot .fb .wm .v { color: var(--teal); }\n.foot .fc { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.06em; color: rgba(255,255,255,.45); }\n\n/* ---------- motion (progressive enhancement) ----------\n   Content is visible by default. Only once JS confirms it's alive\n   (adds .anim to <html>) do we hide-then-reveal. Reveal uses a\n   self-completing @keyframes animation (fill-mode both) — unlike a\n   property transition, it cannot get \"stuck\" mid-way. */\n.anim .reveal { opacity: 0; }\n.anim .reveal.in { animation: mjFadeUp .7s cubic-bezier(.2,.7,.3,1) both; }\n@keyframes mjFadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }\n@media (prefers-reduced-motion: reduce) {\n  .anim .reveal { opacity: 1 !important; }\n  .anim .reveal.in { animation: none !important; }\n  html { scroll-behavior: auto; }\n}\n\n/* ---------- responsive ---------- */\n@media (max-width: 980px) {\n  :root { --pad-x: 30px; }\n  .nav-links { display: none; }\n  .h2 { font-size: 40px; }\n  .hero { padding: 124px 0 60px; }\n  .hero-grid { grid-template-columns: 1fr; gap: 48px; }\n  .hero h1 { font-size: 48px; }\n  .hero-art { min-height: 0; }\n  .float.f1 { left: 0; } .float.f2 { right: 0; }\n  .statband { grid-template-columns: 1fr; gap: 26px; margin-top: 56px; }\n  .why .intro { grid-template-columns: 1fr; gap: 20px; }\n  .problem-grid { grid-template-columns: 1fr; }\n  .quote q { font-size: 26px; }\n  .steps { grid-template-columns: 1fr; gap: 36px; }\n  . \"hills\" data-parallax=\"0.12\" viewBox=\"0 0 1440 600\" preserveAspectRatio=\"xMidYMin slice\" fill=\"none\" aria-hidden=\"true\">\n    <path d=\"M0 400 C 260 340 420 390 720 360 C 1020 330 1180 390 1440 360 L1440 600 L0 600 Z\" fill=\"#E3EFEA\"><\u002Fpath>\n    <path d=\"M0 470 C 320 420 560 460 760 450 C 1040 436 1240 470 1440 448 L1440 600 L0 600 Z\" fill=\"#D6ECE4\"><\u002Fpath>\n    <path d=\"M120 400 Q 360 290 700 340 T 1320 340\" stroke=\"#FFFFFF\" stroke-width=\"5\" stroke-dasharray=\"2 16\" stroke-linecap=\"round\" opacity=\"0.9\"><\u002Fpath>\n    <circle cx=\"700\" cy=\"336\" r=\"11\" fill=\"#15A88C\"><\u002Fcircle>\n  <\u002Fsvg>\n  <div class=\"wrap hero-grid\">\n    <div class=\"hero-copy reveal\">\n      <span class=\"pill\">\n        <span class=\"ic\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span data-lang=\"en\">Patient-experience layer for clinical trials<\u002Fspan>\n        <span data-lang=\"es\">La capa de experiencia del paciente para ensayos clínicos<\u002Fspan>\n      <\u002Fspan>\n      <h1>\n        <span data-lang=\"en\">A protocol they understand.<br>A voice that's <span class=\"hl\">finally heard.<\u002Fspan><\u002Fspan>\n        <span data-lang=\"es\">Un protocolo que entienden.<br>Una voz que <span class=\"hl\">por fin se escucha.<\u002Fspan><\u002Fspan>\n      <\u002Fh1>\n      <p class=\"tag\">\n        <span data-lang=\"en\">MyJourney turns the protocol into a journey patients can follow — and turns how each procedure <strong>actually felt<\u002Fstrong> into early signal for the sponsor.<\u002Fspan>\n        <span data-lang=\"es\">MyJourney convierte el protocolo en un recorrido que el paciente puede seguir — y transforma cómo se <strong>sintió cada procedimiento<\u002Fstrong> en una señal temprana para el sponsor.<\u002Fspan>\n      <\u002Fp>\n      <div class=\"cta-row\">\n        <a href=\"#talk\" class=\"btn primary\"><span data-lang=\"en\">Book a 30-min walkthrough<\u002Fspan><span data-lang=\"es\">Agendá un walkthrough de 30 min<\u002Fspan><\u002Fa>\n        <a href=\"#product\" class=\"btn text\"><span data-lang=\"en\">See how it works<\u002Fspan><span data-lang=\"es\">Ver cómo funciona<\u002Fspan> <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-art reveal\" data-delay=\"120\">\n      <div class=\"halo\" data-parallax=\"-0.06\"><\u002Fdiv>\n      <div class=\"float f1\">\n        <span class=\"ic\" style=\"background:var(--teal-soft)\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <div><div class=\"ti\">0 of 7 visits<\u002Fdiv><div class=\"su\"><span data-lang=\"en\">You're on track<\u002Fspan><span data-lang=\"es\">Vas en camino<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"device\"><img src=\"d96c4b45-1cb1-4eae-a6ab-63d6af71ca32\" alt=\"MyJourney — the study journey\"><\u002Fdiv>\n      <div class=\"float f2\">\n        <span class=\"ic\" style=\"background:var(--amber-soft)\">😐<\u002Fspan>\n        <div><div class=\"ti\">Blood draw<\u002Fdiv><div class=\"su\"><span data-lang=\"en\">A bit uncomfortable<\u002Fspan><span data-lang=\"es\">Algo incómodo<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"statband\">\n      <div class=\"bcard reveal\"><div class=\"n\">30<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"l\"><span data-lang=\"en\">of enrolled patients drop out before completing a trial<\u002Fspan><span data-lang=\"es\">de los pacientes inscritos abandonan antes de completar el ensayo<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"bcard reveal\" data-delay=\"100\"><div class=\"n\">85<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"l\"><span data-lang=\"en\">of trials fail to retain enough patients to complete the study<\u002Fspan><span data-lang=\"es\">de los ensayos no logran retener suficientes pacientes para completarse<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"bcard reveal\" data-delay=\"200\"><div class=\"n\">1<span class=\"u\">st<\u002Fspan><\u002Fdiv><div class=\"l\"><span data-lang=\"en\">platform to capture anonymous, per-procedure patient experience<\u002Fspan><span data-lang=\"es\">plataforma en capturar la experiencia anónima del paciente por procedimiento<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===================== WHY WE EXIST ===================== -->\n<section class=\"section why\" id=\"why\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow reveal\"><span data-lang=\"en\">The problem<\u002Fspan><span data-lang=\"es\">El problema<\u002Fspan><\u002Fp>\n    <h2 class=\"h2 head reveal\" style=\"margin-top:22px;\">\n      <span data-lang=\"en\">Trials were designed around data.<br>They forgot <span class=\"hl\">the people.<\u002Fspan><\u002Fspan>\n      <span data-lang=\"es\">Los ensayos se diseñaron en torno a los datos.<br>Se olvidaron de <span class=\"hl\">las personas.<\u002Fspan><\u002Fspan>\n    <\u002Fh2>\n    <div class=\"intro reveal\">\n      <p>\n        <span data-lang=\"en\">For decades, clinical research has been optimized for everything except the patient experience. Protocols are designed for scientific rigor. Timelines for efficiency. <strong>Reporting for regulators.<\u002Fstrong><\u002Fspan>\n        <span data-lang=\"es\">Durante décadas, la investigación clínica se optimizó para todo menos para la experiencia del paciente. Los protocolos se diseñan para el rigor científico. Los plazos, para la eficiencia. <strong>El reporte, para los reguladores.<\u002Fstrong><\u002Fspan>\n      <\u002Fp>\n      <p>\n        <span data-lang=\"en\">Nobody designed for the person sitting in the waiting room — scared, not understanding what's about to happen, and too intimidated to say so.<\u002Fspan>\n        <span data-lang=\"es\">Nadie diseñó para la persona sentada en la sala de espera — asustada, sin entender qué va a pasar, y demasiado intimidada para decirlo.<\u002Fspan>\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"quote reveal\">\n      <div class=\"glow\"><\u002Fdiv>\n      <q data-lang=\"en\">Science moves forward when it connects with human experience. We don't believe in depersonalized research where the patient is just a number.<\u002Fq>\n      <q data-lang=\"es\">La ciencia avanza cuando se conecta con la experiencia humana. No creemos en una investigación despersonalizada donde el paciente es solo un número.<\u002Fq>\n      <div class=\"attr\"><span data-lang=\"en\">PatientVerse founding principle<\u002Fspan><span data-lang=\"es\">Principio fundacional de PatientVerse<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"problem-grid\">\n      <div class=\"pcard c1 reveal\">\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D8694C\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9 9h.01M15 9h.01M9 16c1-1.2 2-1.8 3-1.8s2 .6 3 1.8\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">Patients feel lost<\u002Fspan><span data-lang=\"es\">Los pacientes se sienten perdidos<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">Complex protocols, medical jargon and zero visibility into what comes next leave patients anxious, disengaged and vulnerable to dropout.<\u002Fspan><span data-lang=\"es\">Protocolos complejos, jerga médica y nula visibilidad de lo que sigue dejan a los pacientes ansiosos, desconectados y vulnerables al abandono.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pcard c2 reveal\" data-delay=\"90\">\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6A57D8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11l18-5v12L3 14v-3z\"><\u002Fpath><path d=\"M11.6 16.8a3 3 0 0 1-5.8-1.6\"><\u002Fpath><line x1=\"2\" y1=\"2\" x2=\"22\" y2=\"22\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">No one captures their voice<\u002Fspan><span data-lang=\"es\">Nadie captura su voz<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">Patient feedback is informal, unstructured and never reaches the people making protocol decisions. A procedure that creates anxiety across 10 sites goes unnoticed until dropout spikes.<\u002Fspan><span data-lang=\"es\">El feedback del paciente es informal, no estructurado y nunca llega a quienes deciden el protocolo. Un procedimiento que genera ansiedad en 10 sitios pasa desapercibido hasta que el abandono se dispara.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pcard c3 reveal\" data-delay=\"60\">\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C68A12\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"13\" r=\"8\"><\u002Fcircle><path d=\"M12 9v4l2.5 2.5M12 2h0M5 4L3 6M19 4l2 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">Sponsors find out too late<\u002Fspan><span data-lang=\"es\">Los sponsors se enteran tarde<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">By the time retention problems show up in the data, months of damage are done. There's no early warning system — until now.<\u002Fspan><span data-lang=\"es\">Para cuando los problemas de retención aparecen en los datos, ya hay meses de daño hecho. No existe un sistema de alerta temprana — hasta ahora.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pcard c4 reveal\" data-delay=\"150\">\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"8\" r=\"3\"><\u002Fcircle><circle cx=\"17\" cy=\"9\" r=\"2.4\"><\u002Fcircle><path d=\"M3 20c0-3 2.7-5 6-5s6 2 6 5M15 20c0-2 .8-3.4 2.4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">Families are left out<\u002Fspan><span data-lang=\"es\">Las familias quedan afuera<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">Loved ones who accompany patients have no visibility — creating friction, reducing support and increasing the emotional burden on participants.<\u002Fspan><span data-lang=\"es\">Los seres queridos que acompañan no tienen visibilidad — generando fricción, reduciendo el apoyo y aumentando la carga emocional sobre los participantes.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== STATEMENT ===================== -->\n<section class=\"section tight statement\">\n  <div class=\"glow\"><\u002Fdiv>\n  <div class=\"wrap reveal\">\n    <p class=\"eyebrow center\"><span data-lang=\"en\">The missing layer<\u002Fspan><span data-lang=\"es\">La capa que falta<\u002Fspan><\u002Fp>\n    <h2>\n      <span data-lang=\"en\">MyJourney translates the protocol into a journey patients understand — then turns how each procedure <span class=\"hl\">actually felt<\u002Fspan> into intelligence the sponsor can act on.<\u002Fspan>\n      <span data-lang=\"es\">MyJourney traduce el protocolo en un recorrido que el paciente entiende — y convierte cómo se <span class=\"hl\">sintió cada procedimiento<\u002Fspan> en inteligencia sobre la que el sponsor puede actuar.<\u002Fspan>\n    <\u002Fh2>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== MYJOURNEY / HOW IT WORKS ===================== -->\n<section class=\"section\" id=\"product\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow reveal\"><span data-lang=\"en\">How it works<\u002Fspan><span data-lang=\"es\">Cómo funciona<\u002Fspan><\u002Fp>\n    <h2 class=\"h2 reveal\" style=\"margin-top:22px;max-width:24ch;\">\n      <span data-lang=\"en\">Three steps. <span class=\"hl\">No new burden<\u002Fspan> on your sites.<\u002Fspan>\n      <span data-lang=\"es\">Tres pasos. <span class=\"hl\">Sin carga adicional<\u002Fspan> para tus sitios.<\u002Fspan>\n    <\u002Fh2>\n    <div class=\"steps\">\n      <div class=\"step a reveal\">\n        <div class=\"num\">1<\u002Fdiv>\n        <div class=\"ico\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18l6-6-6-6\"><\u002Fpath><circle cx=\"4\" cy=\"6\" r=\"1.6\"><\u002Fcircle><circle cx=\"4\" cy=\"18\" r=\"1.6\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">Translate the protocol<\u002Fspan><span data-lang=\"es\">Traducir el protocolo<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">We turn the protocol into a visual patient journey — every visit and procedure in plain, human language. The patient always knows what's next and why.<\u002Fspan><span data-lang=\"es\">Convertimos el protocolo en un recorrido visual — cada visita y procedimiento en lenguaje claro y humano. El paciente siempre sabe qué sigue y por qué.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step b reveal\" data-delay=\"100\">\n        <div class=\"num\">2<\u002Fdiv>\n        <div class=\"ico\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6A57D8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">Capture per-procedure feedback<\u002Fspan><span data-lang=\"es\">Capturar feedback por procedimiento<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">After each procedure, patients leave a quick, anonymous rating. No PII, no clinical data — blinding-safe by design, and frictionless enough that patients actually do it.<\u002Fspan><span data-lang=\"es\">Tras cada procedimiento, el paciente deja una valoración rápida y anónima. Sin datos personales ni clínicos — seguro para el ciego por diseño, y tan simple que el paciente realmente lo hace.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step c reveal\" data-delay=\"200\">\n        <div class=\"num\">3<\u002Fdiv>\n        <div class=\"ico\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C68A12\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M7 14l3-4 3 3 5-7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4><span data-lang=\"en\">Act on blinded insight<\u002Fspan><span data-lang=\"es\">Actuar sobre insight ciego<\u002Fspan><\u002Fh4>\n        <p><span data-lang=\"en\">You receive blinded, aggregated reports showing which procedures and sites create friction — early enough to intervene before retention breaks.<\u002Fspan><span data-lang=\"es\">Recibís reportes ciegos y agregados que muestran qué procedimientos y sitios generan fricción — a tiempo para intervenir antes de que se quiebre la retención.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FEATURE 1 — JOURNEY ===================== -->\n<section class=\"section tight\">\n  <div class=\"wrap feature\">\n    <div class=\"feat-copy reveal\">\n      <p class=\"eyebrow\"><span data-lang=\"en\">The product · the journey<\u002Fspan><span data-lang=\"es\">El producto · el recorrido<\u002Fspan><\u002Fp>\n      <h3><span data-lang=\"en\">A protocol becomes a journey.<\u002Fspan><span data-lang=\"es\">Un protocolo se vuelve un recorrido.<\u002Fspan><\u002Fh3>\n      <p class=\"lead\"><span data-lang=\"en\">From the first screen, the patient sees the whole study as a clear path — visits, procedures, timing and preparation, all in language they understand.<\u002Fspan><span data-lang=\"es\">Desde la primera pantalla, el paciente ve todo el estudio como un camino claro — visitas, procedimientos, tiempos y preparación, todo en lenguaje que entiende.<\u002Fspan><\u002Fp>\n      <ul>\n        <li><strong><span data-lang=\"en\">Plain-language schedule<\u002Fspan><span data-lang=\"es\">Cronograma en lenguaje claro<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">built directly from the protocol<\u002Fspan><span data-lang=\"es\">construido directamente desde el protocolo<\u002Fspan><\u002Fli>\n        <li><strong><span data-lang=\"en\">Progress they can feel<\u002Fspan><span data-lang=\"es\">Progreso que se siente<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">— visits completed, what's coming next<\u002Fspan><span data-lang=\"es\">— visitas completadas y lo que viene<\u002Fspan><\u002Fli>\n        <li><strong><span data-lang=\"en\">Self-serve onboarding<\u002Fspan><span data-lang=\"es\">Onboarding autogestionado<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">from the patient's own phone<\u002Fspan><span data-lang=\"es\">desde el propio teléfono del paciente<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"feat-art duo reveal\" data-delay=\"120\">\n      <div class=\"halo\"><\u002Fdiv>\n      <div class=\"device back\"><img src=\"36ac1b84-8176-4060-a6de-b0d8fc37ac92\" alt=\"Onboarding — choose your avatar\"><\u002Fdiv>\n      <div class=\"device front\"><img src=\"d96c4b45-1cb1-4eae-a6ab-63d6af71ca32\" alt=\"The study journey timeline\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FEATURE 2 — FEEDBACK ===================== -->\n<section class=\"section tight\">\n  <div class=\"wrap feature flip\">\n    <div class=\"feat-copy reveal\">\n      <p class=\"eyebrow\"><span data-lang=\"en\">The product · feedback<\u002Fspan><span data-lang=\"es\">El producto · feedback<\u002Fspan><\u002Fp>\n      <h3><span data-lang=\"en\">How each procedure actually felt.<\u002Fspan><span data-lang=\"es\">Cómo se sintió de verdad cada procedimiento.<\u002Fspan><\u002Fh3>\n      <p class=\"lead\"><span data-lang=\"en\">After a procedure, the patient leaves a quick, anonymous rating — and, if they want, what made it feel that way. It takes seconds, and it's the signal no other system collects.<\u002Fspan><span data-lang=\"es\">Tras un procedimiento, el paciente deja una valoración rápida y anónima — y, si quiere, qué lo hizo sentir así. Toma segundos, y es la señal que ningún otro sistema recoge.<\u002Fspan><\u002Fp>\n      <ul>\n        <li><strong><span data-lang=\"en\">Anonymous by design<\u002Fspan><span data-lang=\"es\">Anónimo por diseño<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">— no PII, no clinical data, blinding-safe<\u002Fspan><span data-lang=\"es\">— sin datos personales ni clínicos, seguro para el ciego<\u002Fspan><\u002Fli>\n        <li><strong><span data-lang=\"en\">Per-procedure<\u002Fspan><span data-lang=\"es\">Por procedimiento<\u002Fspan><\u002Fstrong><span data-lang=\"en\">, not start/mid/end surveys<\u002Fspan><span data-lang=\"es\">, no encuestas de inicio/medio/fin<\u002Fspan><\u002Fli>\n        <li><strong><span data-lang=\"en\">Structured reasons<\u002Fspan><span data-lang=\"es\">Razones estructuradas<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">turn a feeling into an actionable pattern<\u002Fspan><span data-lang=\"es\">convierten una sensación en un patrón accionable<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"feat-art reveal\" data-delay=\"120\">\n      <div class=\"halo\"><\u002Fdiv>\n      <div class=\"device\"><img src=\"26bf48d3-0d27-4e21-a88e-0c2a0c2f86ba\" alt=\"Per-procedure feedback — blood draw rating\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FEATURE 3 — FAMILY MODE ===================== -->\n<section class=\"section tight\">\n  <div class=\"wrap feature\">\n    <div class=\"feat-copy reveal\">\n      <p class=\"eyebrow\"><span data-lang=\"en\">The product · Family Mode<\u002Fspan><span data-lang=\"es\">El producto · Modo Familia<\u002Fspan><\u002Fp>\n      <h3><span data-lang=\"en\">A caregiver walks the same journey.<\u002Fspan><span data-lang=\"es\">Un acompañante recorre el mismo camino.<\u002Fspan><\u002Fh3>\n      <p class=\"lead\"><span data-lang=\"en\">MyJourney is the only platform that puts a relative beside the patient — the same journey, in parallel, with their own limited access.<\u002Fspan><span data-lang=\"es\">MyJourney es la única plataforma que pone a un familiar al lado del paciente — el mismo recorrido, en paralelo, con su propio acceso limitado.<\u002Fspan><\u002Fp>\n      <ul>\n        <li><strong><span data-lang=\"en\">Shared visibility<\u002Fspan><span data-lang=\"es\">Visibilidad compartida<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">into visits and what's coming next<\u002Fspan><span data-lang=\"es\">de las visitas y lo que viene<\u002Fspan><\u002Fli>\n        <li><strong><span data-lang=\"en\">Support that travels with the patient<\u002Fspan><span data-lang=\"es\">Apoyo que acompaña al paciente<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">between appointments<\u002Fspan><span data-lang=\"es\">entre citas<\u002Fspan><\u002Fli>\n        <li><strong><span data-lang=\"en\">Family support<\u002Fspan><span data-lang=\"es\">El apoyo familiar<\u002Fspan><\u002Fstrong> <span data-lang=\"en\">is among the strongest predictors of retention<\u002Fspan><span data-lang=\"es\">es uno de los predictores más fuertes de retención<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"feat-art reveal\" data-delay=\"120\">\n      <div class=\"halo\"><\u002Fdiv>\n      <div class=\"device\"><img src=\"59104d67-8207-40aa-801d-e8c8db5837f5\" alt=\"Family Mode — a companion follows the journey\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== TWO BENEFICIARIES ===================== -->\n<section class=\"section benefit\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow reveal\"><span data-lang=\"en\">Who it serves<\u002Fspan><span data-lang=\"es\">A quién sirve<\u002Fspan><\u002Fp>\n    <h2 class=\"h2 reveal\" style=\"margin-top:22px;max-width:22ch;\">\n      <span data-lang=\"en\">Two beneficiaries, <span class=\"hl\">one loop.<\u002Fspan><\u002Fspan>\n      <span data-lang=\"es\">Dos beneficiarios, <span class=\"hl\">un mismo loop.<\u002Fspan><\u002Fspan>\n    <\u002Fh2>\n    <div class=\"two-panel\">\n      <div class=\"panel patient reveal\">\n        <span class=\"tag2\"><span data-lang=\"en\">For the patient<\u002Fspan><span data-lang=\"es\">Para el paciente<\u002Fspan><\u002Fspan>\n        <h4><span data-lang=\"en\">Understood. Supported.<\u002Fspan><span data-lang=\"es\">Entendido. Acompañado.<\u002Fspan><\u002Fh4>\n        <ul>\n          <li><span data-lang=\"en\">The protocol explained in plain language<\u002Fspan><span data-lang=\"es\">El protocolo explicado en lenguaje claro<\u002Fspan><\u002Fli>\n          <li><span data-lang=\"en\">A guided, lower-anxiety experience that's easy to follow<\u002Fspan><span data-lang=\"es\">Una experiencia guiada, con menos ansiedad y fácil de seguir<\u002Fspan><\u002Fli>\n          <li><span data-lang=\"en\">An anonymous voice that's actually heard<\u002Fspan><span data-lang=\"es\">Una voz anónima que de verdad se escucha<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"panel sponsor reveal\" data-delay=\"100\">\n        <span class=\"tag2\"><span data-lang=\"en\">For the sponsor<\u002Fspan><span data-lang=\"es\">Para el sponsor<\u002Fspan><\u002Fspan>\n        <h4><span data-lang=\"en\">Intelligence you didn't have.<\u002Fspan><span data-lang=\"es\">Inteligencia que no tenías.<\u002Fspan><\u002Fh4>\n        <ul>\n          <li><span data-lang=\"en\">Patient-experience data that doesn't exist today, in real time<\u002Fspan><span data-lang=\"es\">Datos de experiencia del paciente que hoy no existen, en tiempo real<\u002Fspan><\u002Fli>\n          <li><span data-lang=\"en\">Early signals on where retention breaks, by procedure and site<\u002Fspan><span data-lang=\"es\">Señales tempranas de dónde se quiebra la retención, por procedimiento y sitio<\u002Fspan><\u002Fli>\n          <li><span data-lang=\"en\">Blinded aggregate reporting, with no impact on study blinding<\u002Fspan><span data-lang=\"es\">Reporte agregado y ciego, sin impacto en el ciego del estudio<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"site-note reveal\">\n      <span class=\"st\"><span data-lang=\"en\">Site visibility<\u002Fspan><span data-lang=\"es\">Visibilidad de sitios<\u002Fspan><\u002Fspan>\n      <p><span data-lang=\"en\">For the first time, sponsors can see the patient experience <strong>each site delivers<\u002Fstrong> — rated and structured by the patients themselves.<\u002Fspan><span data-lang=\"es\">Por primera vez, los sponsors pueden ver la experiencia que <strong>entrega cada sitio<\u002Fstrong> — valorada y estructurada por los propios pacientes.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== COMPLIANCE ===================== -->\n<section class=\"section\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow reveal\"><span data-lang=\"en\">Compliance &amp; recognition<\u002Fspan><span data-lang=\"es\">Cumplimiento y reconocimiento<\u002Fspan><\u002Fp>\n    <h2 class=\"h2 reveal\" style=\"margin-top:22px;max-width:22ch;\">\n      <span data-lang=\"en\">Built for <span class=\"hl\">regulatory review.<\u002Fspan><\u002Fspan>\n      <span data-lang=\"es\">Diseñado para <span class=\"hl\">revisión regulatoria.<\u002Fspan><\u002Fspan>\n    <\u002Fh2>\n    <div class=\"reg-grid\">\n      <div class=\"anchor reveal\">\n        <div class=\"ck\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h5>ICH-GCP E6(R3)<\u002Fh5>\n        <p><span data-lang=\"en\">Aligned — designed to sit inside good clinical practice from day one.<\u002Fspan><span data-lang=\"es\">Alineado — diseñado para integrarse en la buena práctica clínica desde el día uno.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"anchor reveal\" data-delay=\"80\">\n        <div class=\"ck\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h5>FDA PFDD<\u002Fh5>\n        <p><span data-lang=\"en\">Methodology consistent with Patient-Focused Drug Development.<\u002Fspan><span data-lang=\"es\">Metodología consistente con Patient-Focused Drug Development.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"anchor reveal\" data-delay=\"160\">\n        <div class=\"ck\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h5><span data-lang=\"en\">IRB / Ethics ready<\u002Fspan><span data-lang=\"es\">Listo para IRB / Ética<\u002Fspan><\u002Fh5>\n        <p><span data-lang=\"en\">Structured for ethics review, with a documented data approach.<\u002Fspan><span data-lang=\"es\">Estructurado para revisión ética, con un enfoque de datos documentado.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"anchor reveal\" data-delay=\"240\">\n        <div class=\"ck\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h5><span data-lang=\"en\">Privacy by design<\u002Fspan><span data-lang=\"es\">Privacidad por diseño<\u002Fspan><\u002Fh5>\n        <p><span data-lang=\"en\">Anonymous, blinding-safe capture, separate from the regulated data chain.<\u002Fspan><span data-lang=\"es\">Captura anónima y segura para el ciego, separada de la cadena de datos regulada.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"reg-bottom reveal\">\n      <p class=\"reg-process\"><span data-lang=\"en\">MyJourney is built as a <strong>process, not just a product<\u002Fstrong>. Adopting it means adopting a documented, traceable, defensible approach to patient-experience capture.<\u002Fspan><span data-lang=\"es\">MyJourney está construido como un <strong>proceso, no solo un producto<\u002Fstrong>. Adoptarlo significa adoptar un enfoque documentado, trazable y defendible para capturar la experiencia del paciente.<\u002Fspan><\u002Fp>\n      <div class=\"recog\">\n        <div class=\"stars\">\n          <svg viewBox=\"0 0 24 24\" fill=\"#F2B528\"><path d=\"M12 2l2.9 6.2 6.8.8-5 4.7 1.3 6.7L12 17.8 5.9 20.4 7.2 13.7l-5-4.7 6.8-.8z\"><\u002Fpath><\u002Fsvg>\n          <svg viewBox=\"0 0 24 24\" fill=\"#F2B528\"><path d=\"M12 2l2.9 6.2 6.8.8-5 4.7 1.3 6.7L12 17.8 5.9 20.4 7.2 13.7l-5-4.7 6.8-.8z\"><\u002Fpath><\u002Fsvg>\n          <svg viewBox=\"0 0 24 24\" fill=\"#F2B528\"><path d=\"M12 2l2.9 6.2 6.8.8-5 4.7 1.3 6.7L12 17.8 5.9 20.4 7.2 13.7l-5-4.7 6.8-.8z\"><\u002Fpath><\u002Fsvg>\n          <svg viewBox=\"0 0 24 24\" fill=\"#F2B528\"><path d=\"M12 2l2.9 6.2 6.8.8-5 4.7 1.3 6.7L12 17.8 5.9 20.4 7.2 13.7l-5-4.7 6.8-.8z\"><\u002Fpath><\u002Fsvg>\n          <svg viewBox=\"0 0 24 24\" fill=\"#F2B528\"><path d=\"M12 2l2.9 6.2 6.8.8-5 4.7 1.3 6.7L12 17.8 5.9 20.4 7.2 13.7l-5-4.7 6.8-.8z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"rt\"><div class=\"a\">SCOPE 2026<\u002Fdiv><div class=\"b\"><span data-lang=\"en\">Advanced to second-round judging<\u002Fspan><span data-lang=\"es\">Avanzó a la segunda ronda de evaluación<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== WHO WE ARE ===================== -->\n<section class=\"section why\" id=\"who\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow reveal\"><span data-lang=\"en\">Who we are<\u002Fspan><span data-lang=\"es\">Quiénes somos<\u002Fspan><\u002Fp>\n    <h2 class=\"h2 reveal\" style=\"margin-top:22px;max-width:26ch;\">\n      <span data-lang=\"en\">Built by clinical research professionals — <span class=\"hl\">not tech outsiders.<\u002Fspan><\u002Fspan>\n      <span data-lang=\"es\">Hecho por profesionales de la investigación clínica — <span class=\"hl\">no por outsiders del tech.<\u002Fspan><\u002Fspan>\n    <\u002Fh2>\n    <div class=\"who-grid\" style=\"margin-top:48px;\">\n      <div class=\"who-copy reveal\">\n        <p><span data-lang=\"en\">PatientVerse wasn't built by tech entrepreneurs guessing at a problem. It was built by clinical research professionals who spent years in the field — monitoring studies, sitting in sites, watching patients drop out not because they wanted to quit, but because <strong>no one gave them the tools to stay.<\u002Fstrong><\u002Fspan><span data-lang=\"es\">PatientVerse no fue creado por emprendedores tech adivinando un problema. Lo construyeron profesionales de la investigación clínica que pasaron años en el campo — monitoreando estudios, sentados en los sitios, viendo a pacientes abandonar no porque quisieran, sino porque <strong>nadie les dio las herramientas para quedarse.<\u002Fstrong><\u002Fspan><\u002Fp>\n        <p><span data-lang=\"en\">Our founder is a Senior Clinical Research Associate specializing in rare-disease trials. Every feature of MyJourney reflects direct observations from real studies — not assumptions about what patients might need.<\u002Fspan><span data-lang=\"es\">Nuestro fundador es Senior Clinical Research Associate especializado en ensayos de enfermedades raras. Cada función de MyJourney refleja observaciones directas de estudios reales — no suposiciones sobre lo que el paciente podría necesitar.<\u002Fspan><\u002Fp>\n        <ul class=\"expertise\">\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span data-lang=\"en\">Deep expertise in rare-disease clinical trials<\u002Fspan><span data-lang=\"es\">Experiencia profunda en ensayos de enfermedades raras<\u002Fspan><\u002Fli>\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span data-lang=\"en\">First-hand experience with the dropout problem, from the field<\u002Fspan><span data-lang=\"es\">Experiencia de primera mano con el problema del abandono, desde el campo<\u002Fspan><\u002Fli>\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span data-lang=\"en\">Understands both patient needs and sponsor requirements<\u002Fspan><span data-lang=\"es\">Entiende tanto las necesidades del paciente como los requisitos del sponsor<\u002Fspan><\u002Fli>\n          <li><span class=\"ck\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span data-lang=\"en\">Built the tool they wished had existed during their time in the field<\u002Fspan><span data-lang=\"es\">Construyó la herramienta que deseó que existiera durante su tiempo en el campo<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"global\">\n          <div class=\"gico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E8A72\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3c2.5 2.6 3.8 5.8 3.8 9s-1.3 6.4-3.8 9c-2.5-2.6-3.8-5.8-3.8-9S9.5 5.6 12 3z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div>\n            <h4><span data-lang=\"en\">Global operations<\u002Fspan><span data-lang=\"es\">Operación global<\u002Fspan><\u002Fh4>\n            <p><span data-lang=\"en\">PatientVerse operates globally, with presence in LATAM and Europe — designed for international studies from day one.<\u002Fspan><span data-lang=\"es\">PatientVerse opera globalmente, con presencia en LATAM y Europa — pensado para estudios internacionales desde el día uno.<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"team reveal\" data-delay=\"120\">\n        <div class=\"team-card\">\n          <div class=\"av\">ED<\u002Fdiv>\n          <div>\n            <div class=\"nm\">Ezequiel De Vedia<\u002Fdiv>\n            <div class=\"rl\"><span data-lang=\"en\">Co-founder · Senior Clinical Research Associate<\u002Fspan><span data-lang=\"es\">Co-fundador · Senior Clinical Research Associate<\u002Fspan><\u002Fdiv>\n            <a class=\"em\" href=\"mailto:ezequiel.devedia@patientverse.ai\">ezequiel.devedia@patientverse.ai<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"team-card\">\n          <div class=\"av\">FL<\u002Fdiv>\n          <div>\n            <div class=\"nm\">Fernando Larrusa<\u002Fdiv>\n            <div class=\"rl\"><span data-lang=\"en\">Co-founder<\u002Fspan><span data-lang=\"es\">Co-fundador<\u002Fspan><\u002Fdiv>\n            <a class=\"em\" href=\"mailto:fernando.larrusa@patientverse.ai\">fernando.larrusa@patientverse.ai<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"team-note\"><span data-lang=\"en\">Reach the team directly — we answer every message.<\u002Fspan><span data-lang=\"es\">Escribinos directamente — respondemos cada mensaje.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== LET'S TALK ===================== -->\n<section class=\"section talk\" id=\"talk\">\n  <div class=\"glow\"><\u002Fdiv>\n  <div class=\"glow2\"><\u002Fdiv>\n  <div class=\"wrap talk-inner\">\n    <p class=\"eyebrow reveal\"><span data-lang=\"en\">Let's talk<\u002Fspan><span data-lang=\"es\">Hablemos<\u002Fspan><\u002Fp>\n    <h2 class=\"reveal\">\n      <span data-lang=\"en\">See the working platform — <span class=\"hl\">not slides.<\u002Fspan><\u002Fspan>\n      <span data-lang=\"es\">Conocé la plataforma funcionando — <span class=\"hl\">no slides.<\u002Fspan><\u002Fspan>\n    <\u002Fh2>\n    <div class=\"cta-row reveal\">\n      <a href=\"mailto:ezequiel.devedia@patientverse.ai?subject=MyJourney%20walkthrough\" class=\"btn primary\"><span data-lang=\"en\">Book a 30-min walkthrough<\u002Fspan><span data-lang=\"es\">Agendá un walkthrough de 30 min<\u002Fspan><\u002Fa>\n      <a href=\"https://www.patientverse.ai/\" target=\"_blank\" rel=\"noopener\" class=\"btn ghost\"><span data-lang=\"en\">Visit patientverse.ai<\u002Fspan><span data-lang=\"es\">Visitar patientverse.ai<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"talk-meta reveal\" data-delay=\"100\">\n      <div>\n        <div class=\"label\"><span data-lang=\"en\">Next step<\u002Fspan><span data-lang=\"es\">Próximo paso<\u002Fspan><\u002Fdiv>\n        <div class=\"value\"><span data-lang=\"en\">A 30-minute walkthrough,<br>mapped to your study<\u002Fspan><span data-lang=\"es\">Un walkthrough de 30 minutos,<br>mapeado a tu estudio<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <di
